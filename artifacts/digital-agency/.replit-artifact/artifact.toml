kind = "web"
previewPath = "/"
title = "Digital Marketing Agency"
version = "1.0.0"
id = "artifacts/digital-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23367

[services.development]
run = "pnpm --filter @workspace/digital-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-agency", "run", "build" ]
publicDir = "artifacts/digital-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23367"
BASE_PATH = "/"
